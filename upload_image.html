<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriAI - Upload Image</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .futuristic-bg {
            background-color: #000411; 
            background-image:
                radial-gradient(circle at 50% 50%, rgba(0, 180, 255, 0.05) 1px, transparent 0),
                radial-gradient(circle at 10% 10%, rgba(0, 180, 255, 0.05) 1px, transparent 0),
                radial-gradient(circle at 90% 10%, rgba(0, 180, 255, 0.05) 1px, transparent 0),
                radial-gradient(circle at 10% 90%, rgba(0, 180, 255, 0.05) 1px, transparent 0),
                radial-gradient(circle at 90% 90%, rgba(0, 180, 255, 0.05) 1px, transparent 0);
            background-size: 50px 50px; 
            min-height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
            color: #e5e7eb;
        }

        .neon-card {
            border: 2px solid transparent;
            border-radius: 1.5rem; 
            box-shadow: 0 0 10px rgba(0, 220, 255, 0.2), 0 0 20px rgba(0, 220, 255, 0.05);
            background: rgba(1, 15, 30, 0.85); 
            position: relative;
        }
        .neon-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1.5rem;
            padding: 2px;
            background: linear-gradient(135deg, rgba(0, 220, 255, 0.6), rgba(0, 100, 255, 0.1), rgba(0, 220, 255, 0.6));
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            z-index: 10;
            pointer-events: none;
        }

        .drop-zone {
            border: 2px dashed rgba(0, 220, 255, 0.5);
            background-color: rgba(0, 15, 30, 0.5);
            transition: all 0.3s;
        }
        .drop-zone.drag-over {
            border-color: #00dcff;
            background-color: rgba(0, 20, 50, 0.7);
            box-shadow: 0 0 15px rgba(0, 220, 255, 0.3);
        }

        .progress-bar-fill {
            transition: width 0.5s ease-in-out;
        }

        .sidebar-active {
            background-color: rgba(0, 220, 255, 0.1);
            border-left: 4px solid #00dcff;
            color: #00dcff;
        }
        .sidebar-link {
            transition: all 0.15s ease-in-out;
        }
        .sidebar-link:hover {
            background-color: rgba(0, 220, 255, 0.05);
            color: #00dcff;
        }
    </style>
</head>
<body class="futuristic-bg flex flex-col">

    <!-- Navbar -->
    <header class="w-full bg-black/50 border-b border-cyan-800/50">
        <div class="max-w-7xl mx-auto flex justify-between items-center h-16 px-4 sm:px-6 lg:px-8">
            <div class="flex items-center space-x-2 text-xl font-bold">
                <a href="dashboard.html" class="flex items-center space-x-2 text-xl font-bold hover:text-cyan-400 transition">
                    <svg class="w-6 h-6 text-cyan-500" viewBox="0 0 24 24">
                        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 21 2.3 21 2.3a1 1 0 0 0-1-1c-2.7 0-5.4 5.5-16.1 7.2A7 7 0 0 1 11 20Z"/>
                        <path d="M3 13.8c4.3 0 7.8 3.5 7.8 7.8c0 .2 0 .4-.1 .5C12.3 22 10.8 22 9.5 22A7.8 7.8 0 0 1 3 13.8Z"/>
                    </svg>
                    <span class="text-white text-lg font-semibold tracking-wider">AgriAI</span>
                </a>
            </div>
            <nav class="space-x-4 text-sm md:text-base">
                <a href="about.html" class="text-white hover:text-cyan-400 transition">About Us</a>
                <a href="contact.html" class="text-white hover:text-cyan-400 transition">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Layout -->
    <div class="flex flex-1 max-w-7xl mx-auto w-full">
        <!-- Sidebar -->
        <aside class="w-56 bg-black/50 border-r border-cyan-800/50 p-4 hidden md:block">
            <nav class="space-y-2">
                <a href="dashboard.html" class="flex items-center space-x-3 p-3 rounded-lg text-gray-400 hover:bg-cyan-900/20">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="upload_image.html" class="flex items-center space-x-3 p-3 rounded-lg bg-cyan-900/20 text-cyan-400">
                    <i data-lucide="upload" class="w-5 h-5"></i>
                    <span>Upload Image</span>
                </a>
                <a href="view_results.html" class="flex items-center space-x-3 p-3 rounded-lg text-gray-400 hover:bg-cyan-900/20 hover:text-cyan-300 sidebar-link">
                    <i data-lucide="file-text" class="w-5 h-5"></i>
                    <span>View Results</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6">
            <h1 class="text-3xl font-light text-cyan-400 mb-6">Upload Image</h1>

            <div class="neon-card p-6 md:p-12">
                <div id="dropZone" class="drop-zone flex flex-col lg:flex-row items-center justify-between p-8 rounded-xl min-h-[400px] cursor-pointer">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">

                    <div class="text-center lg:text-left lg:w-3/5 space-y-6">
                        <p class="text-3xl md:text-4xl font-light text-white leading-tight">
                            Drag & Drop Image Here<br>or Click to Upload
                        </p>
                        <button id="uploadButton" class="px-8 py-3 bg-cyan-500 text-black font-bold rounded-xl shadow-lg hover:bg-cyan-400 transition">
                            Upload Leaf Image
                        </button>
                    </div>

                    <div class="lg:w-2/5 flex flex-col items-center justify-center space-y-4 mt-8 lg:mt-0">
                        <div id="imagePreviewContainer" class="w-40 h-40 bg-gray-900 rounded-lg border border-cyan-700 flex items-center justify-center overflow-hidden">
                            <svg class="w-24 h-24 text-lime-400" viewBox="0 0 24 24">
                                <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 21 2.3 21 2.3a1 1 0 0 0-1-1c-2.7 0-5.4 5.5-16.1 7.2A7 7 0 0 1 11 20Z"/>
                                <path d="M3 13.8c4.3 0 7.8 3.5 7.8 7.8c0 .2 0 .4-.1 .5C12.3 22 10.8 22 9.5 22A7.8 7.8 0 0 1 3 13.8Z"/>
                            </svg>
                        </div>

                        <div class="w-full max-w-xs text-center hidden" id="progressBarArea">
                            <p id="analysisStatus" class="text-sm text-cyan-400 mb-2">Awaiting Upload...</p>
                            <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div id="progressBar" class="progress-bar-fill h-full bg-cyan-500 rounded-full" style="width:0%;"></div>
                            </div>
                            <p id="progressPercent" class="text-sm text-white mt-1">0%</p>
                        </div>

                        <!-- Result Container -->
                        <div id="resultContainer" class="hidden mt-4 p-4 neon-card text-white text-center text-lg">
                            <h2 class="text-lg font-bold mb-2">Predictions</h2>
                            <div id="individualResults" class="space-y-1"></div>
                            <div id="ensembleResult" class="mt-2 font-bold text-cyan-400"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        lucide.createIcons();

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadButton = document.getElementById('uploadButton');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const progressBarArea = document.getElementById('progressBarArea');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const analysisStatus = document.getElementById('analysisStatus');
        const resultContainer = document.getElementById('resultContainer');
        const individualResults = document.getElementById('individualResults');
        const ensembleResult = document.getElementById('ensembleResult');

        // Upload Button click triggers file input
        uploadButton.addEventListener('click', () => fileInput.click());

        // Drag & Drop
        ['dragenter','dragover','dragleave','drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
        });
        ['dragenter','dragover'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.add('drag-over')));
        ['dragleave','drop'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.remove('drag-over')));
        dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            if (!file.type.startsWith('image/')) return alert('Upload an image file.');

            const reader = new FileReader();
            reader.onload = e => imagePreviewContainer.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover"/>`;
            reader.readAsDataURL(file);

            uploadToBackend(file);
        }

        function uploadToBackend(file) {
            const formData = new FormData();
            formData.append('file', file);

            progressBarArea.classList.remove('hidden');
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';
            analysisStatus.textContent = "Uploading & Analyzing...";
            resultContainer.classList.add('hidden');
            individualResults.innerHTML = '';
            ensembleResult.innerHTML = '';

            fetch('http://127.0.0.1:5000/predict', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';
                analysisStatus.textContent = "Analysis Complete!";

                // Display individual model predictions
                data.individual.forEach(item => {
                    const div = document.createElement('div');
                    div.textContent = `${item.model}: ${item.disease} (${item.confidence}%)`;
                    individualResults.appendChild(div);
                });

                // Display ensemble prediction
                ensembleResult.textContent = `Ensemble Prediction: ${data.ensemble.disease} (${data.ensemble.confidence}%)`;

                // Save for View Results page
                localStorage.setItem('uploadedImage', imagePreviewContainer.querySelector('img').src);
                localStorage.setItem('disease', JSON.stringify({
                    name: data.ensemble.disease
                }));

                resultContainer.classList.remove('hidden');
            })
            .catch(err => {
                console.error(err);
                analysisStatus.textContent = "Error analyzing image.";
            });
        }
    </script>
</body>
</html>
