<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriAI - Create Account</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Lucide Icons for the eye and chatbot -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Define the futuristic, dark, network background */
        .futuristic-bg {
            background-color: #000411; /* Very dark background */
            background-image:
                radial-gradient(circle at 50% 50%, rgba(0, 180, 255, 0.05) 1px, transparent 0),
                radial-gradient(circle at 10% 10%, rgba(0, 180, 255, 0.05) 1px, transparent 0),
                radial-gradient(circle at 90% 10%, rgba(0, 180, 255, 0.05) 1px, transparent 0),
                radial-gradient(circle at 10% 90%, rgba(0, 180, 255, 0.05) 1px, transparent 0),
                radial-gradient(circle at 90% 90%, rgba(0, 180, 255, 0.05) 1px, transparent 0);
            background-size: 50px 50px; /* Spacing of the dots */
            height: 100vh;
            width: 100vw;
            overflow: auto; /* Allow scrolling if content is too large */
            font-family: 'Inter', sans-serif;
        }

        /* Neon Border effect for the main card */
        .neon-border {
            border: 2px solid transparent;
            border-radius: 1.5rem; /* rounded-3xl */
            box-shadow: 0 0 15px rgba(0, 220, 255, 0.4), 0 0 30px rgba(0, 220, 255, 0.15);
            background: rgba(1, 15, 30, 0.85); /* Slightly transparent dark background */
            position: relative;
        }

        .neon-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1.5rem;
            padding: 2px; /* Control the border thickness */
            background: linear-gradient(135deg, rgba(0, 220, 255, 0.8), rgba(0, 100, 255, 0.2), rgba(0, 220, 255, 0.8));
            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            z-index: 10;
            pointer-events: none;
        }

        /* Style for the input group with neon accent */
        .input-group input {
            background-color: transparent !important;
            border-bottom: 1px solid rgba(0, 220, 255, 0.5) !important;
            color: white !important;
        }
        .input-group input:focus {
            border-bottom-color: #00dcff !important;
            box-shadow: 0 1px 0 0 #00dcff !important;
        }

        /* Custom glow for the active toggle button */
        .toggle-active {
            box-shadow: 0 0 8px rgba(0, 220, 255, 0.6);
            border: 1px solid #00dcff;
        }

        /* Password strength bar styles */
        .strength-bar-container {
            height: 8px;
            background-color: #1a1f33;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }
        .strength-bar {
            height: 100%;
            transition: width 0.3s ease, background-color 0.3s ease;
            width: 0%;
        }
        
        /* Added simple leaf SVG for logo */
        .leaf-icon {
            /* Using inline SVG for the leaf logo */
            display: inline-block;
            width: 1.25em;
            height: 1.25em;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

    </style>
</head>
<body class="futuristic-bg text-white flex flex-col items-center pt-8 md:pt-16">

    <!-- Navbar -->
    <header class="w-full max-w-6xl flex justify-between items-center px-4 mb-10 md:mb-16">
        <div class="flex items-center space-x-2 text-3xl font-bold text-cyan-400">
            <!-- Leaf SVG Icon -->
            <svg class="leaf-icon w-8 h-8 md:w-10 md:h-10 text-cyan-500" viewBox="0 0 24 24">
                <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 21 2.3 21 2.3a1 1 0 0 0-1-1c-2.7 0-5.4 5.5-16.1 7.2A7 7 0 0 1 11 20Z"/>
                <path d="M3 13.8c4.3 0 7.8 3.5 7.8 7.8c0 .2 0 .4-.1 .5C12.3 22 10.8 22 9.5 22A7.8 7.8 0 0 1 3 13.8Z"/>
            </svg>
            <span class="text-white text-xl md:text-2xl font-semibold tracking-wider">AgriAI</span>
        </div>
        <nav class="space-x-4 text-sm md:text-base">
            <a href="about_page.html" class="text-white hover:text-cyan-400 transition">About Us</a>
            <a href="contact.html" class="text-white hover:text-cyan-400 transition">Contact</a>
        </nav>
    </header>

    <!-- Main Account Creation Card -->
    <main class="w-11/12 max-w-md mx-auto p-6 md:p-10 neon-border z-20 mb-8">
        <!-- Sign Up / Login Toggle -->
        <div class="flex justify-center mb-8 bg-gray-900 bg-opacity-50 rounded-full p-1 border border-cyan-700/50">
            <button class="px-5 py-2 text-sm font-medium rounded-full bg-cyan-800/30 text-cyan-400 toggle-active">Sign Up</button>
            <!-- LINK: Clicking this <a> tag navigates to the login.html file -->
            <a href="login.html" class="px-5 py-2 text-sm font-medium rounded-full text-gray-400 hover:text-white transition">Login</a>
        </div>

        <h1 class="text-2xl md:text-3xl font-light tracking-widest text-center text-white mb-8">
            CREATE ACCOUNT
        </h1>

        <!-- Form -->
        <form onsubmit="event.preventDefault(); handleSignUp();" class="space-y-6">

            <!-- Username Field -->
            <div class="input-group">
                <label for="username" class="sr-only">Username</label>
                <input type="text" id="username" placeholder="Username" required
                       class="w-full p-3 border-b border-cyan-500/50 focus:border-cyan-400 transition placeholder-gray-500 text-lg">
            </div>

            <!-- Email Field -->
            <div class="input-group">
                <label for="email" class="sr-only">Email</label>
                <input type="email" id="email" placeholder="Email" required
                       class="w-full p-3 border-b border-cyan-500/50 focus:border-cyan-400 transition placeholder-gray-500 text-lg">
            </div>

            <!-- Password Field -->
            <div class="input-group relative">
                <label for="password" class="sr-only">Password</label>
                <input type="password" id="password" placeholder="Password" required
                       oninput="checkPasswordStrength(this.value)"
                       class="w-full p-3 border-b border-cyan-500/50 focus:border-cyan-400 transition placeholder-gray-500 text-lg pr-10">
                <button type="button" onclick="togglePasswordVisibility()" class="absolute right-0 top-1/2 -translate-y-1/2 p-2 text-cyan-400 hover:text-white transition">
                    <i data-lucide="eye" id="togglePasswordIcon" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Password Strength Indicator -->
            <div class="mb-4">
                <div class="strength-bar-container">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>
                <p id="strengthText" class="text-xs mt-1 h-3 text-right"></p>
            </div>


            <!-- Checkbox -->
            <div class="flex items-start mb-6">
                <input id="terms" type="checkbox" required
                       class="mt-1 w-4 h-4 bg-gray-800 border-cyan-500 rounded text-cyan-500 focus:ring-cyan-500">
                <label for="terms" class="ml-3 text-sm font-medium text-gray-300">
                    By signing up you agree to our <a href="#" class="text-cyan-400 hover:underline">Terms & Privacy Policy</a>
                </label>
            </div>

            <!-- Sign Up Button -->
            <button type="submit"
                    class="w-full py-3 bg-cyan-500 text-black font-bold rounded-xl shadow-lg shadow-cyan-500/50 hover:bg-cyan-400 transition duration-300 ease-in-out transform hover:scale-[1.01] text-lg">
                Sign Up
            </button>

            <!-- Already Have Account Link -->
            <p class="text-center text-sm text-gray-400 mt-4">
                Already have an account? 
                <!-- LINK: Clicking this <a> tag navigates to the login.html file -->
                <a href="login.html" class="text-cyan-400 hover:underline font-medium">Log In</a>
            </p>
        </form>
    </main>

    <!-- Chatbot Icon -->
    <div class="fixed bottom-6 right-6 z-30">
        <div class="relative flex flex-col items-center">
            <span class="text-sm text-white font-medium mb-1 mr-6">Need Help?</span>
            <div class="w-16 h-16 bg-cyan-700/50 border border-cyan-400 rounded-full flex items-center justify-center p-2 shadow-xl shadow-cyan-500/30 cursor-pointer hover:bg-cyan-700 transition duration-200">
                <i data-lucide="bot" class="w-10 h-10 text-cyan-300"></i>
            </div>
        </div>
    </div>

    <!-- Message Box/Modal for Success/Error messages (replaces alert()) -->
    <div id="messageBox" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-50">
        <div class="bg-gray-800 p-8 rounded-xl neon-border max-w-sm w-11/12 text-center">
            <h3 id="messageTitle" class="text-xl font-bold mb-4 text-cyan-400"></h3>
            <p id="messageContent" class="mb-6 text-gray-300"></p>
            <button onclick="closeMessageBox()" class="px-6 py-2 bg-cyan-500 text-black font-medium rounded-lg hover:bg-cyan-400 transition">Close</button>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // --- Utility Functions for Message Box ---
        function showMessageBox(title, content) {
            document.getElementById('messageTitle').textContent = title;
            document.getElementById('messageContent').textContent = content;
            document.getElementById('messageBox').classList.remove('hidden');
            document.getElementById('messageBox').classList.add('flex');
        }

        function closeMessageBox() {
            document.getElementById('messageBox').classList.add('hidden');
            document.getElementById('messageBox').classList.remove('flex');
        }

        // --- Password Visibility Toggle ---
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons(); // Re-render the icon
        }

        // --- Password Strength Checker Logic ---
        function checkPasswordStrength(password) {
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');

            let score = 0;
            const requirements = {
                length: password.length >= 8,
                lower: /[a-z]/.test(password),
                upper: /[A-Z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
            };

            // Calculate score based on met requirements
            if (requirements.length) score += 20;
            if (requirements.lower) score += 20;
            if (requirements.upper) score += 20;
            if (requirements.number) score += 20;
            if (requirements.special) score += 20;

            // Cap score at 100 and apply modifiers
            score = Math.min(100, score);

            let strength = '';
            let color = '';

            if (password.length === 0) {
                score = 0;
                strength = '';
                color = 'transparent';
            } else if (score < 40) {
                strength = 'Weak';
                color = '#ef4444'; // Red-500
            } else if (score < 80) {
                strength = 'Good';
                color = '#f97316'; // Orange-500
            } else {
                strength = 'Strong';
                color = '#22c55e'; // Green-500
            }

            // Update UI
            bar.style.width = `${score}%`;
            bar.style.backgroundColor = color;
            text.textContent = strength;
            text.style.color = color;
        }

        // --- Form Submission Handler ---
        function handleSignUp() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const termsChecked = document.getElementById('terms').checked;

            // Re-check strength to ensure password is at least "Good" before submission
            let score = 0;
            if (password.length >= 8) score += 20;
            if (/[a-z]/.test(password)) score += 20;
            if (/[A-Z]/.test(password)) score += 20;
            if (/[0-9]/.test(password)) score += 20;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) score += 20;
            score = Math.min(100, score);


            if (score < 40) {
                showMessageBox(
                    "Password Too Weak",
                    "Your password needs to be stronger. Please ensure it has at least 8 characters and includes different types of characters (uppercase, number, special symbol)."
                );
                return;
            }

            if (!termsChecked) {
                showMessageBox(
                    "Agreement Required",
                    "You must agree to the Terms & Privacy Policy to create an account."
                );
                return;
            }

            // Simulate API call or successful processing
            console.log(`Attempting to sign up: Username=${username}, Email=${email}`);

            showMessageBox(
                "Account Created Successfully!",
                `Welcome to AgriAI, ${username}. Your account has been registered. You can now log in.`
            );

            // Optional: Reset form fields after success
            document.getElementById('username').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('terms').checked = false;
            checkPasswordStrength(''); // Reset strength indicator
        }
    </script>
</body>
</html>
